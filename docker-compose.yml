services:
  db:
    image: mysql:8.0
    container_name: it-support-db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?set MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: it-support-backend
    restart: always
    environment:
      APP_ENV: ${APP_ENV:?set APP_ENV}
      APP_DEBUG: ${APP_DEBUG:?set APP_DEBUG}
      APP_NAME: ${APP_NAME:?set APP_NAME}
      APP_KEY: ${APP_KEY:?set APP_KEY}
      APP_URL: ${APP_URL:?set APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:?set MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USERNAME:?set MYSQL_USERNAME}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:?set SESSION_SECURE_COOKIE}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:?set SESSION_SAME_SITE}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:?set AUTH_COOKIE_NAME}
      SANCTUM_EXPIRATION: ${SANCTUM_EXPIRATION:?set SANCTUM_EXPIRATION}
      FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
      PAGE_GATE_PIN_HASH: ${PAGE_GATE_PIN_HASH:?set PAGE_GATE_PIN_HASH}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    container_name: it-support-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3000"
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: it-support-nginx
    restart: always
    ports:
      - "8000:80"
    depends_on:
      - backend

volumes:
  db_data:
